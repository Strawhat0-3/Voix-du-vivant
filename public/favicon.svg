<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Fond dégradé terrestre -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="hsl(25, 25%, 12%)" />
      <stop offset="100%" stop-color="hsl(30, 20%, 18%)" />
    </linearGradient>
    <!-- Dégradé ocre/orange pour le V -->
    <linearGradient id="v" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="hsl(24, 65%, 55%)" />
      <stop offset="100%" stop-color="hsl(18, 90%, 52%)" />
    </linearGradient>
  </defs>
  <!-- Cercle de fond — nuit profonde -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)" />
  <!-- Anneau subtil -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="hsl(24, 65%, 55%)" stroke-width="1.2" opacity="0.3" />
  <!-- Lettre V — tracée en stroke pour un look éditorial raffiné -->
  <text
    x="32"
    y="44"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-weight="700"
    font-size="38"
    fill="url(#v)"
    letter-spacing="-1"
  >V</text>
</svg>
